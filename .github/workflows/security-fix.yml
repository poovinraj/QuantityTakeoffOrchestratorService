name: AI Security Auto-Fixer
on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: 'Jira ID'
        required: true
      issue_msg:
        description: 'Vulnerability details'
        required: true
      file_path:
        description: 'File to fix'
        required: true

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GitHub CLI & Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-copilot --force

      - name: Generate Fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We ask Copilot for the fix and pipe it directly to the file
          # The '-p' flag is for "prompt" mode which works in CI
          gh copilot suggest -p "Fix this vulnerability in ${{ github.event.inputs.file_path }}: ${{ github.event.inputs.issue_msg }}. Return only code." > suggested_fix.txt
          
          # Basic cleanup to remove any markdown backticks Copilot might include
          sed -i '/```/d' suggested_fix.txt
          cat suggested_fix.txt > ${{ github.event.inputs.file_path }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "fix/${{ github.event.inputs.jira_key }}"
          title: "🤖 AI Fix: ${{ github.event.inputs.jira_key }}"
          commit-message: "fix: automated security patch for ${{ github.event.inputs.jira_key }}"
          body: |
            ## Automated Security Fix
            - **Jira Ticket:** [${{ github.event.inputs.jira_key }}](https://jira.trimble.tools/browse/${{ github.event.inputs.jira_key }})
            - **Issue Description:** ${{ github.event.inputs.issue_msg }}
            - **Fixed File:** `${{ github.event.inputs.file_path }}`
