name: AI Security Auto-Fixer
on:
  workflow_dispatch:
    inputs:
      jira_key:
        required: true
      issue_msg:
        required: true
      file_path:
        required: true
      line_numbers: 
        required: true

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-copilot --force

      - name: Generate and Apply Fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The prompt now specifically tells Copilot WHICH lines to look at
          PROMPT="Fix the security vulnerability in '${{ github.event.inputs.file_path }}' at lines ${{ github.event.inputs.line_numbers }}. 
          The issue is: ${{ github.event.inputs.issue_msg }}. 
          Return ONLY the corrected code for the entire file, no explanation."

          gh copilot suggest -p "$PROMPT" > suggested_fix.txt
          
          # Clean up Markdown backticks if present
          sed -i '/```/d' suggested_fix.txt
          cat suggested_fix.txt > ${{ github.event.inputs.file_path }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "fix/${{ github.event.inputs.jira_key }}"
          title: "🤖 AI Fix: ${{ github.event.inputs.jira_key }}"
          body: |
            - **Fixed File:** `${{ github.event.inputs.file_path }}`
            - **Affected Lines:** ${{ github.event.inputs.line_numbers }}
            - **Issue:** ${{ github.event.inputs.issue_msg }}
