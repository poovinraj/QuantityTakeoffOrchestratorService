name: AI Security Fixer
on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: 'Jira Ticket Key (e.g., HON-36525)'
        required: true
      issue_msg:
        description: 'The security issue description from SonarQube'
        required: true
      file_path:
        description: 'Path to the vulnerable file'
        required: true
      line_numbers:
        description: 'Specific lines identified by SonarQube'
        required: true

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Fixer with Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Uses the built-in token
        run: |
          # 1. Install the Copilot CLI extension if not present
          gh extension install github/gh-copilot --force

          # 2. Ask Copilot to suggest a fix and apply it
          # We pass the issue message and file path from the n8n inputs
          echo "🤖 Copilot is analyzing ${{ github.event.inputs.file_path }}..."
          
          gh copilot suggest "Fix the security vulnerability in ${{ github.event.inputs.file_path }} described as: ${{ github.event.inputs.issue_msg }}. Provide only the code fix." > fix_suggestion.txt
          
          # 3. Logic to apply the fix (this depends on your specific CLI setup)
          # For a basic implementation, you can have Copilot overwrite the file:
          cat fix_suggestion.txt > ${{ github.event.inputs.file_path }}

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "fix/${{ github.event.inputs.jira_key }}" 
          commit-message: "fix: resolve security issue ${{ github.event.inputs.jira_key }}"
          title: "🤖 AI Fix: ${{ github.event.inputs.jira_key }}"
          body: |
            Automated fix for SonarQube issue.
            - **Jira:** ${{ github.event.inputs.jira_key }}
            - **Issue:** ${{ github.event.inputs.issue_msg }}
